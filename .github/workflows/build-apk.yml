name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip wget \
          openjdk-17-jdk \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev \
          cmake libffi-dev libssl-dev

    - name: Cache Buildozer global directory
      uses: actions/cache@v4
      with:
        path: ~/.buildozer
        key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
        restore-keys: buildozer-${{ runner.os }}-

    - name: Pre-install Android SDK with correct structure
      run: |
        SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
        mkdir -p "$SDK_DIR/cmdline-tools"

        # Download latest cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
        unzip -q cmdline-tools.zip -d "$SDK_DIR/cmdline-tools"
        # Must be named "latest" for sdkmanager to work
        mv "$SDK_DIR/cmdline-tools/cmdline-tools" "$SDK_DIR/cmdline-tools/latest"
        rm cmdline-tools.zip

        SDKMANAGER="$SDK_DIR/cmdline-tools/latest/bin/sdkmanager"

        # Pre-accept all licenses by writing hash files
        mkdir -p "$SDK_DIR/licenses"
        echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >  "$SDK_DIR/licenses/android-sdk-license"
        echo "d975f751698a77b662f1254ddbeed3901e976f5a" >> "$SDK_DIR/licenses/android-sdk-license"
        echo "859f317696f67ef3d7f30a50a5560e7834b43903" >> "$SDK_DIR/licenses/android-sdk-license"
        echo "84831b9409646a918e30573bab4c9c91346d8abd" >  "$SDK_DIR/licenses/android-sdk-preview-license"
        echo "33b6a2b64607f11b759f320ef9dff4ae5c47d97a" >  "$SDK_DIR/licenses/google-gdk-license"

        # Install required SDK components
        yes | "$SDKMANAGER" --sdk_root="$SDK_DIR" \
          "platform-tools" \
          "platforms;android-33" \
          "build-tools;33.0.2"

        # Buildozer looks for sdkmanager at tools/bin/sdkmanager — create a shim
        mkdir -p "$SDK_DIR/tools/bin"
        ln -sf "$SDKMANAGER" "$SDK_DIR/tools/bin/sdkmanager"

    - name: Install Python dependencies
      run: pip install buildozer cython virtualenv

    - name: Build APK
      run: buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: RW-Repacker-APK
        path: ./bin/*.apk
